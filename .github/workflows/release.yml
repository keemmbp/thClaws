name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.2.1)'
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            label: macos-arm64
            archive: tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            label: macos-x86_64
            archive: tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            label: linux-x86_64
            archive: tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            label: linux-arm64
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x86_64
            archive: zip
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Linux GUI dependencies
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Build frontend
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Build release binaries
        working-directory: crates/core
        run: cargo build --release --features gui --target ${{ matrix.target }}

      - name: Collect artifacts (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          mkdir -p dist
          cp crates/core/target/${{ matrix.target }}/release/thclaws dist/
          cp crates/core/target/${{ matrix.target }}/release/thclaws-cli dist/
          cp README.md LICENSE-MIT LICENSE-APACHE CHANGELOG.md dist/
          cd dist
          tar czf ../thclaws-${{ github.ref_name }}-${{ matrix.label }}.tar.gz *

      - name: Collect artifacts (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          mkdir dist
          Copy-Item "crates/core/target/${{ matrix.target }}/release/thclaws.exe" dist/
          Copy-Item "crates/core/target/${{ matrix.target }}/release/thclaws-cli.exe" dist/
          Copy-Item README.md, LICENSE-MIT, LICENSE-APACHE, CHANGELOG.md dist/
          Compress-Archive -Path dist/* -DestinationPath thclaws-${{ github.ref_name }}-${{ matrix.label }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: thclaws-${{ matrix.label }}
          path: thclaws-${{ github.ref_name }}-${{ matrix.label }}.*
          retention-days: 14

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact directory
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Generate checksums
        working-directory: release-assets
        run: sha256sum * > SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
